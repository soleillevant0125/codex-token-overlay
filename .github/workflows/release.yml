name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag, for example v0.2.1
        required: true
        type: string

permissions:
  contents: read

jobs:
  build-windows:
    name: Build Windows (${{ matrix.rid }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        rid:
          - win-x64
          - win-arm64
    env:
      PROJECT_PATH: src/CodexTokenOverlay/CodexTokenOverlay.csproj
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          persist-credentials: false

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Restore
        shell: pwsh
        run: dotnet restore $env:PROJECT_PATH --runtime "${{ matrix.rid }}"

      - name: Publish Lite and Standalone executables
        shell: pwsh
        run: |
          $rid = "${{ matrix.rid }}"
          $litePublishDirectory = Join-Path $env:RUNNER_TEMP "publish-$rid-lite"
          $standalonePublishDirectory = Join-Path $env:RUNNER_TEMP "publish-$rid-standalone"

          dotnet publish $env:PROJECT_PATH `
            --configuration Release `
            --runtime $rid `
            --self-contained false `
            --no-restore `
            --output $litePublishDirectory `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=false `
            -p:EnableCompressionInSingleFile=false `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -p:ContinuousIntegrationBuild=true

          dotnet publish $env:PROJECT_PATH `
            --configuration Release `
            --runtime $rid `
            --self-contained true `
            --no-restore `
            --output $standalonePublishDirectory `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -p:ContinuousIntegrationBuild=true

          $liteExecutable = Join-Path $litePublishDirectory 'CodexTokenOverlay.exe'
          $standaloneExecutable = Join-Path $standalonePublishDirectory 'CodexTokenOverlay.exe'
          foreach ($executable in @($liteExecutable, $standaloneExecutable)) {
            if (-not (Test-Path -LiteralPath $executable -PathType Leaf)) {
              throw "发布结果缺少 CodexTokenOverlay.exe：$executable"
            }
          }

          $liteSize = (Get-Item -LiteralPath $liteExecutable).Length
          $standaloneSize = (Get-Item -LiteralPath $standaloneExecutable).Length
          if ($liteSize -ge 1MB) {
            throw "Lite EXE 超过 1 MiB：$liteSize bytes"
          }
          if ($standaloneSize -le $liteSize) {
            throw "Standalone EXE 体积异常：$standaloneSize bytes"
          }

          Write-Host "Lite: $liteSize bytes; Standalone: $standaloneSize bytes"

          $architecture = $rid.Substring($rid.IndexOf('-') + 1)
          .\scripts\Test-PeArchitecture.ps1 -ExecutablePath $liteExecutable -Architecture $architecture
          .\scripts\Test-PeArchitecture.ps1 -ExecutablePath $standaloneExecutable -Architecture $architecture

          if ($rid -eq 'win-x64') {
            .\scripts\Test-PublishedExecutable.ps1 -ExecutablePath $liteExecutable
          }

      - name: Create ZIP and SHA-256 checksum
        shell: pwsh
        run: |
          $rid = "${{ matrix.rid }}"
          $litePublishDirectory = Join-Path $env:RUNNER_TEMP "publish-$rid-lite"
          $standalonePublishDirectory = Join-Path $env:RUNNER_TEMP "publish-$rid-standalone"
          $assetDirectory = Join-Path $env:RUNNER_TEMP 'release-assets'
          New-Item -ItemType Directory -Path $assetDirectory -Force | Out-Null

          $packages = @(
            @{
              PublishDirectory = $litePublishDirectory
              AssetName = "CodexTokenOverlay-$rid-lite"
              IsLite = $true
            },
            @{
              PublishDirectory = $standalonePublishDirectory
              AssetName = "CodexTokenOverlay-$rid"
              IsLite = $false
            }
          )

          foreach ($package in $packages) {
            $stageDirectory = Join-Path $env:RUNNER_TEMP $package.AssetName
            New-Item -ItemType Directory -Path $stageDirectory -Force | Out-Null

            Copy-Item -LiteralPath (Join-Path $package.PublishDirectory 'CodexTokenOverlay.exe') -Destination $stageDirectory
            Copy-Item -LiteralPath 'README.md' -Destination $stageDirectory
            Copy-Item -LiteralPath 'README.zh-CN.md' -Destination $stageDirectory
            Copy-Item -LiteralPath 'LICENSE' -Destination $stageDirectory
            if ($package.IsLite) {
              Copy-Item -LiteralPath 'packaging/windows/INSTALL-DOTNET-RUNTIME.txt' -Destination $stageDirectory
            }

            $zipName = "$($package.AssetName).zip"
            $zipPath = Join-Path $assetDirectory $zipName
            Compress-Archive -Path (Join-Path $stageDirectory '*') -DestinationPath $zipPath -CompressionLevel Optimal -Force

            $hash = (Get-FileHash -LiteralPath $zipPath -Algorithm SHA256).Hash.ToLowerInvariant()
            $checksumPath = "$zipPath.sha256"
            "$hash  $zipName" | Set-Content -LiteralPath $checksumPath -Encoding utf8NoBOM
          }

      - name: Upload release assets
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.rid }}
          path: |
            ${{ runner.temp }}/release-assets/CodexTokenOverlay-${{ matrix.rid }}*.zip
            ${{ runner.temp }}/release-assets/CodexTokenOverlay-${{ matrix.rid }}*.zip.sha256
          if-no-files-found: error
          retention-days: 7

  build-macos:
    name: Build macOS (${{ matrix.asset }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
            asset: macos-arm64
          - runner: macos-15-intel
            arch: x86_64
            asset: macos-x64
    runs-on: ${{ matrix.runner }}
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}
          persist-credentials: false

      - name: Test log parsing and task routing
        run: swift test --package-path macos

      - name: Build app bundle
        shell: bash
        run: |
          if [[ ! "$RELEASE_TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must match vMAJOR.MINOR.PATCH: $RELEASE_TAG" >&2
            exit 2
          fi
          version="${RELEASE_TAG#v}"
          output="$RUNNER_TEMP/package-${{ matrix.asset }}"
          bash macos/script/package_app.sh \
            --arch "${{ matrix.arch }}" \
            --configuration release \
            --version "$version" \
            --output "$output"

          app="$output/CodexTokenOverlay.app"
          binary="$app/Contents/MacOS/CodexTokenOverlayMac"
          test -d "$app"
          test -x "$binary"
          plutil -lint "$app/Contents/Info.plist"
          codesign --verify --deep --strict --verbose=2 "$app"
          lipo -archs "$binary" | grep -qw "${{ matrix.arch }}"

      - name: Create ZIP and SHA-256 checksum
        shell: bash
        run: |
          asset="${{ matrix.asset }}"
          package_directory="$RUNNER_TEMP/package-$asset"
          stage_directory="$RUNNER_TEMP/CodexTokenOverlay-$asset"
          asset_directory="$RUNNER_TEMP/release-assets"
          mkdir -p "$stage_directory" "$asset_directory"

          ditto "$package_directory/CodexTokenOverlay.app" "$stage_directory/CodexTokenOverlay.app"
          cp README.md README.zh-CN.md LICENSE "$stage_directory/"

          zip_name="CodexTokenOverlay-$asset.zip"
          zip_path="$asset_directory/$zip_name"
          ditto -c -k --sequesterRsrc --keepParent "$stage_directory" "$zip_path"
          read -r hash _ < <(shasum -a 256 "$zip_path")
          printf '%s  %s\n' "$hash" "$zip_name" >"$zip_path.sha256"

      - name: Upload release assets
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.asset }}
          path: |
            ${{ runner.temp }}/release-assets/CodexTokenOverlay-${{ matrix.asset }}.zip
            ${{ runner.temp }}/release-assets/CodexTokenOverlay-${{ matrix.asset }}.zip.sha256
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub Release
    needs:
      - build-windows
      - build-macos
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Create or update GitHub Release
        shell: pwsh
        run: |
          $assets = @(Get-ChildItem -LiteralPath 'release-assets' -File | ForEach-Object FullName)
          $expectedAssetNames = @(
            'CodexTokenOverlay-win-x64.zip',
            'CodexTokenOverlay-win-x64.zip.sha256',
            'CodexTokenOverlay-win-x64-lite.zip',
            'CodexTokenOverlay-win-x64-lite.zip.sha256',
            'CodexTokenOverlay-win-arm64.zip',
            'CodexTokenOverlay-win-arm64.zip.sha256',
            'CodexTokenOverlay-win-arm64-lite.zip',
            'CodexTokenOverlay-win-arm64-lite.zip.sha256',
            'CodexTokenOverlay-macos-arm64.zip',
            'CodexTokenOverlay-macos-arm64.zip.sha256',
            'CodexTokenOverlay-macos-x64.zip',
            'CodexTokenOverlay-macos-x64.zip.sha256'
          )
          $actualAssetNames = @($assets | ForEach-Object { Split-Path -Leaf $_ })
          $assetDifference = @(Compare-Object -ReferenceObject $expectedAssetNames -DifferenceObject $actualAssetNames)
          if ($assetDifference.Count -ne 0) {
            $details = $assetDifference | ForEach-Object { "$($_.SideIndicator) $($_.InputObject)" }
            throw "发布文件清单不完整或含有意外文件：`n$($details -join "`n")"
          }

          & gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY *> $null
          $releaseExists = $LASTEXITCODE -eq 0
          if ($releaseExists) {
            & gh release upload $env:RELEASE_TAG @assets --repo $env:GITHUB_REPOSITORY --clobber
          }
          else {
            & gh release create $env:RELEASE_TAG @assets `
              --repo $env:GITHUB_REPOSITORY `
              --title $env:RELEASE_TAG `
              --generate-notes `
              --verify-tag
          }

          if ($LASTEXITCODE -ne 0) {
            throw "GitHub Release 发布失败：$env:RELEASE_TAG"
          }
