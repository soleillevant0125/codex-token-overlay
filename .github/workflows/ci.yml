name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish-check:
    name: Publish check (${{ matrix.rid }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        rid:
          - win-x64
          - win-arm64
    env:
      PROJECT_PATH: src/CodexTokenOverlay/CodexTokenOverlay.csproj
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up .NET 10 SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Test log parsing and CODEX_HOME discovery
        if: matrix.rid == 'win-x64'
        shell: pwsh
        run: .\scripts\Test-LogParser.ps1

      - name: Restore
        shell: pwsh
        run: dotnet restore $env:PROJECT_PATH --runtime "${{ matrix.rid }}"

      - name: Publish Lite and Standalone executables
        shell: pwsh
        run: |
          $rid = "${{ matrix.rid }}"
          $liteOutput = Join-Path $env:RUNNER_TEMP "publish-$rid-lite"
          $standaloneOutput = Join-Path $env:RUNNER_TEMP "publish-$rid-standalone"

          dotnet publish $env:PROJECT_PATH `
            --configuration Release `
            --runtime $rid `
            --self-contained false `
            --no-restore `
            --output $liteOutput `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=false `
            -p:EnableCompressionInSingleFile=false `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -p:ContinuousIntegrationBuild=true

          dotnet publish $env:PROJECT_PATH `
            --configuration Release `
            --runtime $rid `
            --self-contained true `
            --no-restore `
            --output $standaloneOutput `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=true `
            -p:DebugType=None `
            -p:DebugSymbols=false `
            -p:ContinuousIntegrationBuild=true

          $liteExecutable = Join-Path $liteOutput 'CodexTokenOverlay.exe'
          $standaloneExecutable = Join-Path $standaloneOutput 'CodexTokenOverlay.exe'
          foreach ($executable in @($liteExecutable, $standaloneExecutable)) {
            if (-not (Test-Path -LiteralPath $executable -PathType Leaf)) {
              throw "发布结果缺少 CodexTokenOverlay.exe：$executable"
            }
          }

          $liteSize = (Get-Item -LiteralPath $liteExecutable).Length
          $standaloneSize = (Get-Item -LiteralPath $standaloneExecutable).Length
          if ($liteSize -ge 1MB) {
            throw "Lite EXE 超过 1 MiB：$liteSize bytes"
          }
          if ($standaloneSize -le $liteSize) {
            throw "Standalone EXE 体积异常：$standaloneSize bytes"
          }

          Write-Host "Lite: $liteSize bytes; Standalone: $standaloneSize bytes"

          $architecture = $rid.Substring($rid.IndexOf('-') + 1)
          .\scripts\Test-PeArchitecture.ps1 -ExecutablePath $liteExecutable -Architecture $architecture
          .\scripts\Test-PeArchitecture.ps1 -ExecutablePath $standaloneExecutable -Architecture $architecture

          if ($rid -eq 'win-x64') {
            .\scripts\Test-PublishedExecutable.ps1 -ExecutablePath $liteExecutable
          }

  macos-check:
    name: macOS check (${{ matrix.asset }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            arch: arm64
            asset: macos-arm64
          - runner: macos-15-intel
            arch: x86_64
            asset: macos-x64
    runs-on: ${{ matrix.runner }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Show Swift toolchain
        run: swift --version

      - name: Reject unsafe package output paths
        shell: bash
        run: |
          if bash macos/script/package_app.sh --arch "${{ matrix.arch }}" --output ..; then
            echo "package_app.sh accepted an unsafe output path" >&2
            exit 1
          fi

      - name: Test log parsing and task routing
        run: swift test --package-path macos

      - name: Build and validate app bundle
        shell: bash
        run: |
          output="$RUNNER_TEMP/package-${{ matrix.asset }}"
          bash macos/script/package_app.sh \
            --arch "${{ matrix.arch }}" \
            --configuration release \
            --version 0.2.1 \
            --output "$output"

          app="$output/CodexTokenOverlay.app"
          binary="$app/Contents/MacOS/CodexTokenOverlayMac"
          test -d "$app"
          test -x "$binary"
          plutil -lint "$app/Contents/Info.plist"
          codesign --verify --deep --strict --verbose=2 "$app"
          lipo -archs "$binary" | grep -qw "${{ matrix.arch }}"
